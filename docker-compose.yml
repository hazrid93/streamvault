# StreamVault — production deployment via Docker Compose.
#
# Prerequisites:
#   1. Copy .env.example to .env and configure all values:
#      cp .env.example .env
#   2. Build and start:
#      docker compose up -d --build
#
# The app is available at http://localhost:${PORT:-3000}.
# First run creates the database automatically (db:prepare).
#
# Create an admin user:
#   docker compose exec web bin/rails c
#   > User.create!(email: "you@example.com", password: "password", password_confirmation: "password")
#
# Containers restart automatically and survive system reboots
# (restart: unless-stopped + Docker's systemd service).

services:
  web:
    build:
      context: .
    env_file: .env
    ports:
      - "${PORT:-3000}:80"
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-streamvault}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-streamvault}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streamvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-streamvault}
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamvault}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
