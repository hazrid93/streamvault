# Run the app in production with Docker Compose.
#
# Assets are precompiled in the image during build. No volume mounts
# for source code or assets — everything lives in the image.
#
# Usage:
#   docker compose up -d --build
#
# All env vars are read from .env (encryption keys, API keys, etc).
# Set PORT in .env to change the host port (default 3000).
#
# Requires in .env:
#   RAILS_MASTER_KEY — same as config/master.key
#   SECRET_KEY_BASE  — generate with: bin/rails secret
#
# First run will create the database automatically (db:prepare).
# Create a user by opening the Rails console:
#   docker compose exec web bin/rails c
#   > User.create!(email: "you@example.com", password: "password", password_confirmation: "password")

services:
  web:
    build:
      context: .
    env_file: .env
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - storage_data:/rails/storage
    environment:
      RAILS_ENV: production
    restart: unless-stopped

volumes:
  storage_data:
