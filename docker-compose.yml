# StreamVault — production deployment via Docker Compose.
#
# Prerequisites:
#   1. Copy .env.example to .env and configure all values:
#      cp .env.example .env
#   2. Build and start:
#      docker compose up -d --build
#
# The app is available at http://localhost:${PORT:-3000}.
# First run creates the database automatically (db:prepare).
#
# Create an admin user:
#   docker compose exec web bin/rails c
#   > User.create!(email: "you@example.com", password: "password", password_confirmation: "password")
#
# Containers restart automatically and survive system reboots
# (restart: unless-stopped + Docker's systemd service).

services:
  web:
    build:
      context: .
    env_file: .env
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - storage_data:/rails/storage
    environment:
      RAILS_ENV: production
    restart: unless-stopped

volumes:
  storage_data:
