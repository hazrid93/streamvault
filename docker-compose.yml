# Run the app locally in production mode with Docker Compose.
#
# Assets are precompiled in the image — no tailwindcss:watch needed.
# The local development files (app/assets/builds, public/assets) are
# NOT mounted, so they don't interfere with the container's precompiled
# production assets.
#
# Usage:
#   docker compose up
#
# All env vars are read from .env (encryption keys, API keys, etc).
# Set PORT in .env to change the host port (default 3000).
#
# Requires RAILS_MASTER_KEY in .env (same as config/master.key).
# First run will create the database automatically (db:prepare).
# Create a user by opening the Rails console:
#   docker compose exec web bin/rails c
#   > User.create!(email: "you@example.com", password: "password", password_confirmation: "password")

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "${PORT:-3000}:80"
    volumes:
      # Mount source code for live editing, but exclude asset directories
      # so the container's precompiled assets aren't shadowed by local
      # development assets.
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - storage_data:/rails/storage
      # Preserve container's precompiled assets over the mount
      - /rails/public/assets
      - /rails/app/assets/builds
    environment:
      RAILS_ENV: production
      BUNDLE_PATH: /usr/local/bundle

volumes:
  bundle_cache:
  storage_data:
