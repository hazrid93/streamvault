# Tinyproxy configuration for torrentio / Cinemeta.
#
# Edit this file, then start with:
#   docker compose up -d --build

User tinyproxy
Group tinyproxy

Port 8888

# ── Listen: which interface to bind ──────────────────────────────
# Default: all interfaces (0.0.0.0).
# For Tailscale-only access, set to your VPS's Tailscale IP:
#   Listen 100.x.x.x
# This is the most secure option — the port is invisible on the
# public interface, only reachable via Tailscale.
# Listen 0.0.0.0

# ── Allow: IP-based access control ───────────────────────────────
# Only listed IPs/CIDRs can use the proxy.
# When any Allow line is present, all other IPs are denied by default.
# Specify one IP or CIDR per line. Examples:
#   Allow 127.0.0.1
#   Allow 100.x.x.x          # dedicated server's Tailscale IP
#   Allow 192.168.1.0/24     # CIDR range
Allow 127.0.0.1
# Allow <your-dedicated-server-tailscale-ip>

# ── Domain whitelist ─────────────────────────────────────────────
# Only these domains can be proxied. All others are blocked.
# Uses fnmatch (shell glob) matching — fastest option.
Filter "/etc/tinyproxy/filter"
FilterType fnmatch
FilterDefaultDeny Yes

# ── Stealth: don't add Via header ────────────────────────────────
# Cloudflare's WAF can detect proxy traffic via the Via header.
# Disabling it is necessary for the Cloudflare bypass use case.
DisableViaHeader Yes

# ── Restrict CONNECT to HTTPS port only ──────────────────────────
# Prevents the proxy from being used for non-HTTPS traffic.
# Both torrentio and Cinemeta use HTTPS (port 443).
ConnectPort 443

# ── Timeouts and limits ──────────────────────────────────────────
Timeout 600
MaxClients 100

# ── Logging ──────────────────────────────────────────────────────
# Log to stdout (captured by Docker).
LogFile "/dev/stdout"
LogLevel Info
PidFile "/tmp/tinyproxy.pid"
