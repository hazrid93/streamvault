# Tinyproxy forward proxy for torrentio / Cinemeta.
#
# Uses network_mode: host so tinyproxy sees real client IPs for
# the Allow directive (Docker's default bridge network NATs source
# IPs, which breaks IP-based access control).
#
# Start:
#   docker compose up -d --build
#
# View logs:
#   docker compose logs -f

services:
  tinyproxy:
    build: .
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./filter:/etc/tinyproxy/filter:ro
